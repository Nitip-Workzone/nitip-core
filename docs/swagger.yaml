host: localhost:8000
info:
  contact:
    email: support@nitip.id
    name: API Support
  description: Nitip Core REST API server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Nitip Core API
  version: "1.0"
paths:
  /admin/configs:
    get:
      description: Retrieve all dynamic configuration values
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_domain_config.Config'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: '[ADMIN] List all configs'
      tags:
      - '[Admin] System Config'
  /admin/configs/{key}:
    put:
      consumes:
      - application/json
      description: Set or update a specific configuration key
      parameters:
      - description: Config Key
        in: path
        name: key
        required: true
        type: string
      - description: New config details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_domain_config.updateConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "422":
          description: Unprocessable Entity
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                errors:
                  items:
                    $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.ValidationError'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: '[ADMIN] Update a config value'
      tags:
      - '[Admin] System Config'
  /admin/kyc/{id}/review:
    post:
      consumes:
      - application/json
      description: Approve or reject a user's identity verification documents
      parameters:
      - description: KYC ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Review decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_domain_kyc.ReviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
      security:
      - BearerAuth: []
      summary: '[ADMIN] Review a KYC submission'
      tags:
      - '[Admin] KYC Review'
  /admin/kyc/pending:
    get:
      description: Retrieve a paginated list of KYC submissions waiting for review
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_domain_kyc.KycSubmission'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: '[ADMIN] List pending KYC submissions'
      tags:
      - '[Admin] KYC Review'
  /admin/orders:
    get:
      description: Retrieve orders with optional status filter
      parameters:
      - description: Order status filter
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_domain_order.Order'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: '[ADMIN] List orders'
      tags:
      - '[Admin] Order Management'
  /admin/orders/{id}/cancel:
    post:
      description: Allows an admin to forcefully cancel an order, bypassing normal
        states
      parameters:
      - description: Order UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
      security:
      - BearerAuth: []
      summary: '[ADMIN] Force cancel an order'
      tags:
      - '[Admin] Order Management'
  /admin/orders/{id}/pay:
    post:
      description: Stub endpoint to simulate payment Gateway callback setting order
        to escrow
      parameters:
      - description: Order UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
      security:
      - BearerAuth: []
      summary: Simulate order payment
      tags:
      - '[Admin] Order Management'
  /admin/orders/{id}/resolve:
    post:
      description: Assigns the escrow funds back to the requester or to the runner
        based on investigation
      parameters:
      - description: Order UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Resolution details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_domain_order.ResolvePayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "422":
          description: Unprocessable Entity
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                errors:
                  items:
                    $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.ValidationError'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: '[ADMIN] Resolve an order dispute'
      tags:
      - '[Admin] Order Management'
  /admin/orders/{id}/resolve-dispute:
    post:
      description: Assigns the escrow funds back to the requester or to the runner
        based on investigation
      parameters:
      - description: Order UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Resolution details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_domain_order.ResolvePayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
        "422":
          description: Unprocessable Entity
