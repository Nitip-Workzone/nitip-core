    post:
      description: Exchange API Key + HMAC Signature for a short-lived grant token
        (15 min)
      parameters:
      - description: API Key (public identifier)
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: RFC3339 timestamp (must be within ±5 min)
        in: header
        name: X-Timestamp
        required: true
        type: string
      - description: HMAC-SHA256(timestamp.sha256(body), api_secret)
        in: header
        name: X-Signature
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_codecoffy_nitip-core_pkg_response.envelope'
            - properties:
                data:
