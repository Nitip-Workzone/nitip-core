securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Registrasi akun baru (requester/runner) dan login untuk mendapatkan
    JWT token.
  name: Auth
- description: 'Admin: Daftar pengguna, verifikasi akun, update trust score, dan suspend
    pengguna.'
  name: '[Admin] User Management'
- description: 'Admin: Review dan setujui/tolak dokumen KYC yang diajukan Runner.'
  name: '[Admin] KYC Review'
- description: 'Admin: Pantau semua order, batalkan paksa, dan selesaikan sengketa.'
  name: '[Admin] Order Management'
- description: 'Admin: Kelola permintaan penarikan dana dari Runner.'
  name: '[Admin] Finance'
- description: 'Admin: Baca dan ubah nilai konfigurasi sistem secara dinamis.'
  name: '[Admin] System Config'
- description: Proses verifikasi identitas (KTP + Selfie) agar Runner dapat menerima
    order.
  name: '[Runner] KYC'
- description: Runner mendaftarkan rencana perjalanan beserta kapasitas kendaraan.
  name: '[Runner] Trip'
- description: Runner melihat, menerima, membelikan, dan mengirimkan pesanan.
  name: '[Runner] Order Execution'
- description: Manajemen profil dan alamat rumah untuk pengguna yang sedang login.
  name: '[User] Profile'
- description: Penitip membuat pesanan baru, melakukan pembayaran, dan mengajukan
    sengketa.
  name: '[User] Order'
- description: Top-up saldo dompet, lihat riwayat transaksi, dan ajukan penarikan
    dana.
  name: '[User] Finance'
- description: Endpoint bersama untuk melihat detail dan status pesanan (berlaku untuk
    semua peran).
  name: '[Shared] Order View'
- description: Chat real-time (WebSocket) dan live tracking lokasi Runner (SSE & WebSocket).
  name: '[Shared] Communications & Tracking'
