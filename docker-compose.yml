version: '3.8'

services:
  app:
    networks:
      - nitip-net
    build: .
    container_name: nitip-core
    restart: unless-stopped
    env_file: .env
    environment:
      # Ensure db host matches container name
      DB_HOST: nitip-postgres
      REDIS_ADDR: nitip-redis:6379
    ports:
      - "127.0.0.1:8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 350M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=nitip-core"

  postgres:
    networks:
      - nitip-net
    image: postgis/postgis:16-3.4-alpine
    container_name: nitip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nitip}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nitip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=postgres"

  redis:
    networks:
      - nitip-net
    image: redis:7-alpine
    container_name: nitip-redis
    restart: unless-stopped
    command: redis-server
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=redis"

  dozzle:
    networks:
      - nitip-net
    image: amir20/dozzle:latest
    container_name: nitip-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3030:8080"
    deploy:
      resources:
        limits:
          memory: 50M

networks:
  nitip-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
