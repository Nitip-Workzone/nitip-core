services:
  app:
    networks:
      - nitip-net
    build: .
    container_name: nitip-core
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: nitip-postgres
      REDIS_ADDR: nitip-redis:6379
      GOMAXPROCS: "2"
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - /var/www/nitip-core/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=nitip-core"

  postgres:
    networks:
      - nitip-net
    image: postgis/postgis:16-3.4-alpine
    container_name: nitip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nitip}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1024MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=2
      -c max_parallel_workers=2
      -c max_parallel_workers_per_gather=1
      -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nitip}"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: 768M
        reservations:
          cpus: "0.2"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=postgres"

  redis:
    networks:
      - nitip-net
    image: redis:7-alpine
    container_name: nitip-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 192mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --hz 5
      --activedefrag no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.02"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        labels: "logging_job=redis"

  dozzle:
    networks:
      - nitip-net
    image: amir20/dozzle:latest
    container_name: nitip-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./users.yml:/data/users.yml:ro
    environment:
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_FILTER: "name=nitip-"
      DOZZLE_LEVEL: warn
    ports:
      - "127.0.0.1:3030:8080"
    cpu_shares: 128
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 48M
        reservations:
          cpus: "0.01"
          memory: 24M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        labels: "logging_job=dozzle"

networks:
  nitip-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: